# Spec alineado con la app live "seal-app" en App Platform (región ATL).
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

name: seal-app
region: atl

features:
  - buildpack-stack=ubuntu-22

ingress:
  rules:
    - component:
        name: vikingo-landing
      match:
        path:
          prefix: /

services:
  - name: vikingo-landing
    environment_slug: node-js
    github:
      repo: christiangonzalezandrade-web/vikingo-landing
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm ci --include=dev && npm run build
    run_command: npm run start:platform
    http_port: 8080
    envs:
      - key: PORT
        value: "8080"
        scope: RUN_TIME
      - key: NODE_ENV
        value: production
        scope: RUN_TIME
    health_check:
      http_path: /api/health
      port: 8080
      initial_delay_seconds: 90
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb

domains:
  - domain: vikingo-systems.com
    type: PRIMARY
    zone: vikingo-systems.com
  - domain: www.vikingo-systems.com
    type: ALIAS
    zone: vikingo-systems.com
